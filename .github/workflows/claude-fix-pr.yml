# Claude Fix PR — автоматически исправляет PR когда добавлен label "needs-fixes".
# Читает комментарии ревьюера и запускает Claude Code для исправления.

name: Claude Fix PR

on:
  pull_request:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: claude-fix-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event.label.name == 'needs-fixes'

    env:
      GH_REPO: ${{ github.repository }}
      WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

    steps:
      - name: Require ANTHROPIC_API_KEY
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "${ANTHROPIC_API_KEY}" ]; then
            echo "::error::ANTHROPIC_API_KEY secret is not configured."
            exit 1
          fi

      - name: Initialize paths
        run: |
          TEMP="${RUNNER_TEMP}/claude-fix"
          mkdir -p "${TEMP}"
          {
            echo "CLAUDE_FIX_TEMP=${TEMP}"
            echo "PR_CONTEXT_PATH=${TEMP}/pr-context.json"
          } >> "${GITHUB_ENV}"

      - name: Build PR fix context
        id: ctx
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          PR_DATA=$(gh pr view "${PR_NUMBER}" --json number,title,body,comments,reviews,headRefName)

          echo "${PR_DATA}" > "${PR_CONTEXT_PATH}"

          ISSUE_NUMBER=$(echo "${PR_DATA}" | python3 -c "
          import json,sys,re
          d = json.load(sys.stdin)
          body = d.get('body','')
          m = re.search(r'[Cc]loses?\s+#(\d+)|[Ii]ssue\s+#(\d+)', body)
          if m: print(m.group(1) or m.group(2))
          " 2>/dev/null || echo "")

          echo "pr_number=${PR_NUMBER}" >> "${GITHUB_OUTPUT}"
          echo "head_branch=${HEAD_BRANCH}" >> "${GITHUB_OUTPUT}"
          echo "issue_number=${ISSUE_NUMBER}" >> "${GITHUB_OUTPUT}"

      - name: Comment (fix started)
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.ctx.outputs.pr_number }}
        run: |
          gh pr comment "${PR_NUMBER}" --body \
            "🔧 **Claude Code fix mode started** — addressing review comments. Workflow: ${WORKFLOW_RUN_URL}"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.ctx.outputs.head_branch }}
          fetch-depth: 0
          persist-credentials: false
          sparse-checkout-cone-mode: true
          sparse-checkout: |
            .github
            scripts
            docs
            AGENTS.md
            customs-clear/backend/app
            customs-clear/backend/tests
            customs-clear/backend/scripts
            customs-clear/backend/data
            customs-clear/backend/alembic
            customs-clear/frontend

      - name: Install Claude Code CLI
        run: |
          npm install -g @anthropic-ai/claude-code
          claude --version

      - name: Run Claude fix agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.ctx.outputs.pr_number }}
        run: |
          # Build comprehensive fix prompt
          PR_DATA=$(cat "${PR_CONTEXT_PATH}")

          PR_TITLE=$(echo "${PR_DATA}" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('title',''))")
          PR_BODY=$(echo "${PR_DATA}" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('body','')[:1000])")

          REVIEW_COMMENTS=$(echo "${PR_DATA}" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          out = []
          for r in (d.get('reviews') or []):
              state = r.get('state','')
              author = (r.get('author') or {}).get('login','')
              body = (r.get('body') or '')[:500]
              if body:
                  out.append(f'[{state}] {author}: {body}')
          for c in (d.get('comments') or []):
              author = (c.get('author') or {}).get('login','')
              body = (c.get('body') or '')[:300]
              if 'claude-approved' not in body and 'Auto-merged' not in body:
                  out.append(f'[comment] {author}: {body}')
          print('\n'.join(out[:8]))
          ")

          cat > /tmp/fix_prompt.txt << HEREDOC
          You are fixing a PR based on reviewer feedback.

          ## PR #${PR_NUMBER}: ${PR_TITLE}

          ## PR Description
          ${PR_BODY}

          ## Review Comments / Requested Changes
          ${REVIEW_COMMENTS}

          ## Your Task
          - Address ALL P1 (blocker) issues mentioned in the review comments above.
          - Focus only on what was requested — no unrelated refactors.
          - Run the relevant tests after fixing to confirm they pass.
          - Primary backend: customs-clear/backend/ (not legacy root backend/).
          - Do NOT create branches, push, or open PRs — CI handles git after you.
          - Do NOT change broker enforcement, payment calculations, or provenance validation unless explicitly requested.

          ## Constraints
          - Read AGENTS.md if present for repo conventions.
          - Keep changes focused and minimal.
          - If a fix is ambiguous, implement the most conservative interpretation.
          HEREDOC

          env -u GITHUB_TOKEN -u GH_TOKEN \
            ANTHROPIC_API_KEY="${ANTHROPIC_API_KEY}" \
            claude --print --output-format text --dangerously-skip-permissions \
            "$(cat /tmp/fix_prompt.txt)"

      - name: Commit and push fixes
        id: git_commit
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.ctx.outputs.pr_number }}
          HEAD_BRANCH: ${{ steps.ctx.outputs.head_branch }}
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
            echo "No changes produced by Claude fix agent."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Address review feedback for PR #${PR_NUMBER}"
          echo "changed=true" >> "${GITHUB_OUTPUT}"

      - name: Push fixes
        if: steps.git_commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_BRANCH: ${{ steps.ctx.outputs.head_branch }}
        run: |
          gh auth setup-git
          git push origin "${HEAD_BRANCH}"

      - name: Remove needs-fixes label
        if: steps.git_commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.ctx.outputs.pr_number }}
        run: |
          gh pr edit "${PR_NUMBER}" --remove-label "needs-fixes" 2>/dev/null || true
          gh pr comment "${PR_NUMBER}" --body \
            "✅ **Claude Code fixes applied** — pushed a new commit addressing review feedback. Workflow: ${WORKFLOW_RUN_URL}"

      - name: Comment (no changes)
        if: steps.git_commit.outputs.changed == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.ctx.outputs.pr_number }}
        run: |
          gh pr comment "${PR_NUMBER}" --body \
            "⚠️ **Claude Code fix mode** — agent made no changes. Review comments may need manual attention. Workflow: ${WORKFLOW_RUN_URL}"

      - name: Comment (workflow failed)
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.ctx.outputs.pr_number }}
        run: |
          gh pr comment "${PR_NUMBER}" --body \
            "❌ **Claude Code fix failed** — see logs: ${WORKFLOW_RUN_URL}"
