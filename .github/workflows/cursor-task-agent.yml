# Cursor Task automation: issue label `cursor-task` → Claude Code CLI agent → branch + PR.
# Docs: docs/ai-workflow/CURSOR_GITHUB_ACTION_AUTOMATION.md

name: Cursor Task Agent

on:
  issues:
    types: [opened, labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: GitHub issue number to run cursor-task automation for
        required: true
        type: number
      update_existing_pr:
        description: Reuse and update the existing open cursor-task PR for this issue
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: cursor-task-issue-${{ github.event.issue.number || github.event.inputs.issue_number }}
  cancel-in-progress: false

jobs:
  cursor-task:
    if: >-
      (
        github.event_name == 'issues' &&
        !github.event.issue.pull_request &&
        (
          contains(toJson(github.event.issue.labels.*.name), '"cursor-task"') ||
          contains(toJson(github.event.issue.labels.*.name), '"claude"') ||
          contains(toJson(github.event.issue.labels.*.name), '"cursor"')
        )
      ) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      GH_REPO: ${{ github.repository }}
      WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

    steps:
      - name: Require ANTHROPIC_API_KEY secret
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "${ANTHROPIC_API_KEY}" ]; then
            echo "::error::Repository secret ANTHROPIC_API_KEY is not configured."
            echo "Add it under Settings → Secrets and variables → Actions."
            echo "See docs/ai-workflow/CURSOR_GITHUB_ACTION_AUTOMATION.md"
            exit 1
          fi

      - name: Initialize runtime paths
        run: |
          CURSOR_TASK_TEMP="${RUNNER_TEMP}/cursor-task"
          mkdir -p "${CURSOR_TASK_TEMP}"
          {
            echo "CURSOR_TASK_TEMP=${CURSOR_TASK_TEMP}"
            echo "ISSUE_CONTEXT_PATH=${CURSOR_TASK_TEMP}/issue-context.json"
            echo "OPEN_PRS_PATH=${CURSOR_TASK_TEMP}/open-prs.json"
            echo "EXISTING_PR_CONTEXT_PATH=${CURSOR_TASK_TEMP}/existing-pr-context.json"
            echo "PR_BODY_PATH=${CURSOR_TASK_TEMP}/pr-body.md"
          } >> "${GITHUB_ENV}"

      - name: Resolve issue context
        id: issue_ctx
        uses: actions/github-script@v7
        env:
          ISSUE_CONTEXT_PATH: ${{ env.ISSUE_CONTEXT_PATH }}
          DISPATCH_ISSUE_NUMBER: ${{ github.event.inputs.issue_number }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const ctxPath = process.env.ISSUE_CONTEXT_PATH;
            fs.mkdirSync(path.dirname(ctxPath), { recursive: true });

            let issue;
            if (context.eventName === 'workflow_dispatch') {
              const rawIssueNumber = String(process.env.DISPATCH_ISSUE_NUMBER || '');
              if (!/^[1-9][0-9]*$/.test(rawIssueNumber)) {
                core.setFailed(
                  `Invalid issue_number: ${rawIssueNumber}. Expected a positive integer without leading zeros.`
                );
                return;
              }
              const issueNumber = Number(rawIssueNumber);
              const { data } = await github.rest.issues.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
              });
              issue = data;
            } else {
              issue = context.payload.issue;
            }

            const labelNames = (issue.labels || []).map((label) =>
              typeof label === 'string' ? label : label.name
            );

            if (issue.pull_request) {
              core.setFailed('Target is a pull request, not an ordinary issue.');
              return;
            }
            if (issue.state === 'closed') {
              core.setFailed(`Issue #${issue.number} is closed.`);
              return;
            }
            const TRIGGER_LABELS = ['cursor-task', 'claude', 'cursor'];
            if (!labelNames.some(l => TRIGGER_LABELS.includes(l))) {
              core.setFailed(`Issue #${issue.number} does not have a trigger label (cursor-task, claude, cursor).`);
              return;
            }

            const ctx = {
              number: issue.number,
              title: issue.title || '',
              body: issue.body || '',
              html_url: issue.html_url,
            };
            fs.writeFileSync(ctxPath, JSON.stringify(ctx, null, 2));

            const slug = (ctx.title || 'task')
              .toLowerCase()
              .replace(/[^a-z0-9]+/g, '-')
              .replace(/^-|-$/g, '')
              .slice(0, 40) || 'task';
            core.setOutput('branch_name', `cursor/issue-${ctx.number}-${slug}`);
            core.setOutput('issue_number', String(ctx.number));
            core.setOutput('valid', 'true');

      - name: Authorize trusted actor
        id: authorize
        if: steps.issue_ctx.outcome == 'success'
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          CURSOR_TASK_TRUSTED_ACTORS: ${{ vars.CURSOR_TASK_TRUSTED_ACTORS }}
        run: |
          AUTHORIZED=false
          if [ "${GITHUB_ACTOR}" = "ivan88810900-star" ]; then
            AUTHORIZED=true
          fi
          if [ -n "${CURSOR_TASK_TRUSTED_ACTORS}" ]; then
            IFS=',' read -ra EXTRA_ACTORS <<< "${CURSOR_TASK_TRUSTED_ACTORS}"
            for actor in "${EXTRA_ACTORS[@]}"; do
              actor="${actor#"${actor%%[![:space:]]*}"}"
              actor="${actor%"${actor##*[![:space:]]}"}"
              if [ -n "${actor}" ] && [ "${GITHUB_ACTOR}" = "${actor}" ]; then
                AUTHORIZED=true
              fi
            done
          fi
          if [ "${AUTHORIZED}" = true ]; then
            echo "authorized=true" >> "${GITHUB_OUTPUT}"
            echo "Authorized actor: ${GITHUB_ACTOR}"
          else
            echo "authorized=false" >> "${GITHUB_OUTPUT}"
            echo "::warning::Actor ${GITHUB_ACTOR} is not in cursor-task trusted allowlist."
          fi

      - name: Comment on issue (unauthorized actor)
        if: steps.issue_ctx.outcome == 'success' && steps.authorize.outputs.authorized != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ steps.issue_ctx.outputs.issue_number }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          gh issue comment "${ISSUE_NUMBER}" --body \
            "🚫 **Cursor Task automation skipped** — actor \`${GITHUB_ACTOR}\` is not in the trusted allowlist. Only maintainers listed in \`CURSOR_TASK_TRUSTED_ACTORS\` (default: \`ivan88810900-star\`) may run write-enabled automation."

      - uses: actions/checkout@v4
        if: steps.authorize.outputs.authorized == 'true'
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false
          sparse-checkout-cone-mode: true
          sparse-checkout: |
            .github
            scripts
            docs
            AGENTS.md
            customs-clear/backend/app
            customs-clear/backend/tests
            customs-clear/backend/scripts
            customs-clear/backend/data
            customs-clear/backend/alembic
            customs-clear/frontend

      - name: Detect existing open PR for this issue
        id: existing_pr
        if: steps.authorize.outputs.authorized == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ steps.issue_ctx.outputs.issue_number }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          UPDATE_EXISTING_PR: ${{ github.event.inputs.update_existing_pr || 'false' }}
        run: |
          ISSUE_NUM="${ISSUE_NUMBER}"
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          BRANCH_PREFIX="cursor/issue-${ISSUE_NUM}-"
          gh pr list --state open --limit 1000 \
            --json number,url,headRefName,headRepositoryOwner,headRepository \
            > "${OPEN_PRS_PATH}"
          COUNT=$(python3 scripts/automation/count_cursor_task_duplicate_prs.py \
            --branch-prefix "${BRANCH_PREFIX}" \
            --owner "${REPOSITORY_OWNER}" \
            --repo "${REPO_NAME}" \
            "${OPEN_PRS_PATH}")
          echo "count=${COUNT}" >> "${GITHUB_OUTPUT}"
          echo "update_existing_pr=${UPDATE_EXISTING_PR}" >> "${GITHUB_OUTPUT}"
          if [ "${COUNT}" -gt 0 ]; then
            python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          data = json.loads(Path(os.environ['OPEN_PRS_PATH']).read_text(encoding='utf-8'))
          branch_prefix = f"cursor/issue-{os.environ['ISSUE_NUMBER']}-"
          owner = os.environ['REPOSITORY_OWNER']
          repo = os.environ['GITHUB_REPOSITORY'].split('/', 1)[1]
          matches = [
              pr for pr in data
              if str(pr.get('headRefName') or '').startswith(branch_prefix)
              and (pr.get('headRepositoryOwner') or {}).get('login') == owner
              and (pr.get('headRepository') or {}).get('name') == repo
          ]
          if matches:
              pr = matches[0]
              with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as fh:
                  fh.write(f"pr_number={pr['number']}\n")
                  fh.write(f"pr_url={pr['url']}\n")
                  fh.write(f"head_branch={pr['headRefName']}\n")
          PY
          fi
          if [ "${COUNT}" -gt 0 ] && [ "${UPDATE_EXISTING_PR}" != "true" ]; then
            gh issue comment "${ISSUE_NUM}" --body \
              "⏭️ **Cursor Task automation skipped** — an open PR already exists for this issue (branch prefix \`${BRANCH_PREFIX}*\`). Re-run with \`update_existing_pr=true\` to update that PR branch."
          fi

      - name: Build existing PR review context
        if: >-
          steps.authorize.outputs.authorized == 'true' &&
          steps.existing_pr.outputs.count != '0' &&
          steps.existing_pr.outputs.update_existing_pr == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.existing_pr.outputs.pr_number }}
          PR_URL: ${{ steps.existing_pr.outputs.pr_url }}
          HEAD_BRANCH: ${{ steps.existing_pr.outputs.head_branch }}
        run: |
          {
            echo "{"
            echo "  \"number\": ${PR_NUMBER},"
            echo "  \"url\": \"${PR_URL}\","
            echo "  \"head_branch\": \"${HEAD_BRANCH}\","
            echo "  \"comments\": "
            gh pr view "${PR_NUMBER}" --json comments,reviews --jq '{comments: .comments, reviews: .reviews}'
            echo "}"
          } > "${EXISTING_PR_CONTEXT_PATH}"

      - name: Comment on issue (run started)
        if: >-
          steps.authorize.outputs.authorized == 'true' &&
          (
            steps.existing_pr.outputs.count == '0' ||
            steps.existing_pr.outputs.update_existing_pr == 'true'
          )
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ steps.issue_ctx.outputs.issue_number }}
          EXISTING_PR_URL: ${{ steps.existing_pr.outputs.pr_url }}
        run: |
          if [ -n "${EXISTING_PR_URL}" ]; then
            gh issue comment "${ISSUE_NUMBER}" --body \
              "🤖 **Cursor Task update mode started** for existing PR: ${EXISTING_PR_URL} (workflow run: ${WORKFLOW_RUN_URL})."
          else
            gh issue comment "${ISSUE_NUMBER}" --body \
              "🤖 **Cursor Task automation started** (workflow run: ${WORKFLOW_RUN_URL})."
          fi

      - name: Create task branch
        if: steps.authorize.outputs.authorized == 'true' && steps.existing_pr.outputs.count == '0'
        env:
          BRANCH_NAME: ${{ steps.issue_ctx.outputs.branch_name }}
        run: |
          git checkout -B "${BRANCH_NAME}"

      - name: Checkout existing PR branch
        if: >-
          steps.authorize.outputs.authorized == 'true' &&
          steps.existing_pr.outputs.count != '0' &&
          steps.existing_pr.outputs.update_existing_pr == 'true'
        env:
          BRANCH_NAME: ${{ steps.existing_pr.outputs.head_branch }}
        run: |
          git fetch origin "${BRANCH_NAME}:${BRANCH_NAME}"
          git checkout "${BRANCH_NAME}"

      - name: Install Claude Code CLI
        if: >-
          steps.authorize.outputs.authorized == 'true' &&
          (
            steps.existing_pr.outputs.count == '0' ||
            steps.existing_pr.outputs.update_existing_pr == 'true'
          )
        run: |
          npm install -g @anthropic-ai/claude-code
          claude --version

      - name: Run Claude Code agent (headless)
        if: >-
          steps.authorize.outputs.authorized == 'true' &&
          (
            steps.existing_pr.outputs.count == '0' ||
            steps.existing_pr.outputs.update_existing_pr == 'true'
          )
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          env -u GITHUB_TOKEN -u GH_TOKEN \
            ANTHROPIC_API_KEY="${ANTHROPIC_API_KEY}" \
            ISSUE_CONTEXT_PATH="${ISSUE_CONTEXT_PATH}" \
            EXISTING_PR_CONTEXT_PATH="${EXISTING_PR_CONTEXT_PATH}" \
            python3 scripts/automation/run_cursor_task_from_issue.py

      - name: Commit changes
        if: >-
          steps.authorize.outputs.authorized == 'true' &&
          (
            steps.existing_pr.outputs.count == '0' ||
            steps.existing_pr.outputs.update_existing_pr == 'true'
          )
        id: git_commit
        env:
          ISSUE_NUMBER: ${{ steps.issue_ctx.outputs.issue_number }}
          UPDATE_EXISTING_PR: ${{ steps.existing_pr.outputs.update_existing_pr }}
        run: |
          git add -A
          python3 scripts/automation/validate_cursor_task_staged_changes.py
          if git diff --cached --quiet; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
            echo "No changes produced by Cursor agent."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ "${UPDATE_EXISTING_PR}" = "true" ]; then
            git commit -m "Address cursor-task review for issue #${ISSUE_NUMBER}"
          else
            git commit -m "Implement cursor-task issue #${ISSUE_NUMBER}"
          fi
          echo "changed=true" >> "${GITHUB_OUTPUT}"

      - name: Push branch
        if: >-
          steps.authorize.outputs.authorized == 'true' &&
          steps.git_commit.outputs.changed == 'true' &&
          (
            steps.existing_pr.outputs.count == '0' ||
            steps.existing_pr.outputs.update_existing_pr == 'true'
          )
        env:
          GH_TOKEN: ${{ github.token }}
          NEW_BRANCH_NAME: ${{ steps.issue_ctx.outputs.branch_name }}
          EXISTING_BRANCH_NAME: ${{ steps.existing_pr.outputs.head_branch }}
          UPDATE_EXISTING_PR: ${{ steps.existing_pr.outputs.update_existing_pr }}
        run: |
          gh auth setup-git
          if [ "${UPDATE_EXISTING_PR}" = "true" ]; then
            git push origin "${EXISTING_BRANCH_NAME}"
          else
            git push --force-with-lease origin "${NEW_BRANCH_NAME}"
          fi

      - name: Open pull request
        if: steps.authorize.outputs.authorized == 'true' && steps.existing_pr.outputs.count == '0' && steps.git_commit.outputs.changed == 'true'
        id: open_pr
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH_NAME: ${{ steps.issue_ctx.outputs.branch_name }}
        run: |
          python3 scripts/automation/render_cursor_task_pr_body.py "${ISSUE_CONTEXT_PATH}" \
            --workflow-run-url "${WORKFLOW_RUN_URL}" \
            --test-status "See workflow run logs for agent commands and test output." \
            > "${PR_BODY_PATH}"
          PR_TITLE=$(python3 scripts/automation/render_cursor_task_pr_title.py "${ISSUE_CONTEXT_PATH}")
          PR_URL=$(gh pr create \
            --base main \
            --head "${BRANCH_NAME}" \
            --title "${PR_TITLE}" \
            --body-file "${PR_BODY_PATH}")
          echo "url=${PR_URL}" >> "${GITHUB_OUTPUT}"

      - name: Comment on issue (PR opened)
        if: steps.authorize.outputs.authorized == 'true' && steps.existing_pr.outputs.count == '0' && steps.git_commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ steps.issue_ctx.outputs.issue_number }}
          PR_URL: ${{ steps.open_pr.outputs.url }}
        run: |
          gh issue comment "${ISSUE_NUMBER}" --body \
            "✅ **Cursor Task automation finished** — PR opened: ${PR_URL}"

      - name: Comment on issue (existing PR updated)
        if: >-
          steps.authorize.outputs.authorized == 'true' &&
          steps.existing_pr.outputs.update_existing_pr == 'true' &&
          steps.git_commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ steps.issue_ctx.outputs.issue_number }}
          PR_URL: ${{ steps.existing_pr.outputs.pr_url }}
        run: |
          gh issue comment "${ISSUE_NUMBER}" --body \
            "✅ **Cursor Task update mode finished** — pushed a new commit to existing PR: ${PR_URL}"

      - name: Comment on issue (no changes)
        if: >-
          steps.authorize.outputs.authorized == 'true' &&
          steps.git_commit.outputs.changed == 'false' &&
          (
            steps.existing_pr.outputs.count == '0' ||
            steps.existing_pr.outputs.update_existing_pr == 'true'
          )
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ steps.issue_ctx.outputs.issue_number }}
          PR_URL: ${{ steps.existing_pr.outputs.pr_url }}
        run: |
          if [ -n "${PR_URL}" ]; then
            gh issue comment "${ISSUE_NUMBER}" --body \
              "⚠️ **Cursor Task update mode finished** — the agent made no file changes for existing PR: ${PR_URL}. Check workflow logs or refine the issue/review context."
          else
            gh issue comment "${ISSUE_NUMBER}" --body \
              "⚠️ **Cursor Task automation finished** — the agent made no file changes. Check workflow logs or refine the issue body."
          fi

      - name: Comment on issue (workflow failed)
        if: failure() && steps.authorize.outputs.authorized == 'true' && steps.issue_ctx.outputs.issue_number != ''
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ steps.issue_ctx.outputs.issue_number }}
        run: |
          gh issue comment "${ISSUE_NUMBER}" --body \
            "❌ **Cursor Task automation failed** — see workflow logs: ${WORKFLOW_RUN_URL}"
