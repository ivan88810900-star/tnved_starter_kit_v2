# Claude Auto Merge — мержит PR автоматически когда:
# 1. label "claude-approved" добавлен
# 2. PR без конфликтов (MERGEABLE)
# 3. Нет label "do-not-merge" / "needs-fixes"

name: Claude Auto Merge

on:
  pull_request:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event.label.name == 'claude-approved'

    steps:
      - name: Check merge conditions
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          PR_INFO=$(gh pr view "${PR_NUMBER}" --json mergeable,labels,reviewDecision,headRefName,title)

          MERGEABLE=$(echo "${PR_INFO}" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('mergeable',''))")
          TITLE=$(echo "${PR_INFO}" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('title',''))")
          LABELS=$(echo "${PR_INFO}" | python3 -c "import json,sys; d=json.load(sys.stdin); print(','.join(l['name'] for l in d.get('labels',[])))")

          echo "mergeable=${MERGEABLE}" >> "${GITHUB_OUTPUT}"
          echo "title=${TITLE}" >> "${GITHUB_OUTPUT}"
          echo "labels=${LABELS}" >> "${GITHUB_OUTPUT}"

          # Block conditions
          if echo "${LABELS}" | grep -q "do-not-merge"; then
            echo "blocked=true" >> "${GITHUB_OUTPUT}"
            echo "::warning::PR has 'do-not-merge' label — skipping auto-merge."
          elif echo "${LABELS}" | grep -q "needs-fixes"; then
            echo "blocked=true" >> "${GITHUB_OUTPUT}"
            echo "::warning::PR has 'needs-fixes' label — skipping auto-merge."
          elif [ "${MERGEABLE}" != "MERGEABLE" ]; then
            echo "blocked=true" >> "${GITHUB_OUTPUT}"
            echo "::warning::PR is not mergeable (${MERGEABLE}) — skipping."
          else
            echo "blocked=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Merge PR
        if: steps.check.outputs.blocked == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ steps.check.outputs.title }}
        run: |
          echo "Merging PR #${PR_NUMBER}: ${PR_TITLE}"
          gh pr merge "${PR_NUMBER}" \
            --squash \
            --subject "${PR_TITLE}" \
            --body "Auto-merged by Claude Code reviewer after approval and passing tests."
          echo "✅ PR #${PR_NUMBER} merged successfully."

      - name: Comment on blocked merge
        if: steps.check.outputs.blocked == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          MERGEABLE: ${{ steps.check.outputs.mergeable }}
          LABELS: ${{ steps.check.outputs.labels }}
        run: |
          gh pr comment "${PR_NUMBER}" --body \
            "⚠️ **Auto-merge skipped** — mergeable: \`${MERGEABLE}\`, labels: \`${LABELS}\`.
            Fix conflicts or remove blocking labels, then re-add \`claude-approved\` to retry."
