name: Scheduled Data Refresh Check

on:
  schedule:
    - cron: '0 2 * * 0'  # Every Sunday at 02:00 UTC
    - cron: '0 9 1 12 *'  # 1 December — check ROP rates update (PP 1041)
    - cron: '0 4 * * 1'  # Monday 04:00 UTC — FTS rulings crawler (#143)
    - cron: '0 5 * * 1'  # Monday 05:00 UTC — TROIS registry fetch (#151)
  workflow_dispatch:
    inputs:
      force_issue:
        description: 'Create issue even if data is fresh'
        type: boolean
        default: false

permissions:
  contents: read
  issues: write

jobs:
  check-data-freshness:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: customs-clear/backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -q sqlalchemy loguru python-dotenv httpx

      - name: Check all data freshness
        id: freshness
        run: |
          python3 -c "
          import json
          from datetime import datetime, timedelta
          from pathlib import Path

          stale_domains = []
          summary_lines = []

          # --- Check normative bundles ---
          bundles = {
              'EEC_ETT': 'data/raw_normative/eec_ett_normative_bundle.json',
              'EEC_VAT': 'data/raw_normative/eec_ett_vat.json',
              'EEC_EXCISE': 'data/raw_normative/eec_excise.json',
              'EEC_ANTI_DUMPING': 'data/raw_normative/eec_anti_dumping.json',
              'EEC_SPECIAL_SAFEGUARD': 'data/raw_normative/eec_special_safeguard.json',
              'EEC_COUNTERVAILING': 'data/raw_normative/eec_countervailing.json',
          }

          for domain, path in bundles.items():
              p = Path(path)
              if not p.exists():
                  stale_domains.append(f'{domain}: bundle missing')
                  summary_lines.append(f'| {domain} | MISSING | - | :x: |')
                  continue
              with open(p) as f:
                  data = json.load(f)
              rev = data.get('revision', '')
              parts = rev.split(':')
              if len(parts) >= 2:
                  try:
                      rev_date = datetime.strptime(parts[-1], '%Y-%m-%d')
                      age_days = (datetime.now() - rev_date).days
                      if age_days > 90:
                          stale_domains.append(f'{domain}: {age_days} days old (rev={rev})')
                          summary_lines.append(f'| {domain} | {parts[-1]} | {age_days}d | :warning: |')
                      else:
                          summary_lines.append(f'| {domain} | {parts[-1]} | {age_days}d | :white_check_mark: |')
                  except ValueError:
                      stale_domains.append(f'{domain}: unparseable revision date ({rev})')
                      summary_lines.append(f'| {domain} | {rev} | ? | :x: |')
              else:
                  stale_domains.append(f'{domain}: no date in revision ({rev})')
                  summary_lines.append(f'| {domain} | {rev} | ? | :x: |')

          # --- Write outputs ---
          with open('$GITHUB_OUTPUT', 'a') as out:
              if stale_domains:
                  out.write('STALE=true\n')
                  body = '\n'.join(f'- {s}' for s in stale_domains)
                  out.write(f'STALE_BODY<<EOF\n{body}\nEOF\n')
              else:
                  out.write('STALE=false\n')

              table = '\n'.join(summary_lines)
              out.write(f'SUMMARY_TABLE<<EOF\n{table}\nEOF\n')
              out.write(f'STALE_COUNT={len(stale_domains)}\n')
          "

      - name: Check EEC site reachability
        id: eec_check
        run: |
          python3 -c "
          import urllib.request

          url = 'https://eec.eaeunion.org/comission/department/catr/ett/'
          try:
              req = urllib.request.Request(url, headers={'User-Agent': 'CustomsClear/1.0 data-refresh-check'})
              resp = urllib.request.urlopen(req, timeout=30)
              print(f'EEC_REACHABLE=true')
              print(f'EEC_STATUS={resp.status}')
          except Exception as e:
              print(f'EEC_REACHABLE=false')
              print(f'EEC_ERROR={e}')
          " >> "$GITHUB_OUTPUT"

      - name: Check CBR site reachability
        id: cbr_check
        run: |
          python3 -c "
          import urllib.request

          url = 'https://www.cbr.ru/scripts/XML_daily.asp'
          try:
              req = urllib.request.Request(url, headers={'User-Agent': 'CustomsClear/1.0 data-refresh-check'})
              resp = urllib.request.urlopen(req, timeout=30)
              print(f'CBR_REACHABLE=true')
              print(f'CBR_STATUS={resp.status}')
          except Exception as e:
              print(f'CBR_REACHABLE=false')
              print(f'CBR_ERROR={e}')
          " >> "$GITHUB_OUTPUT"

      - name: Create issue if data is stale
        if: steps.freshness.outputs.STALE == 'true' || inputs.force_issue == true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh issue list --state open --label "data-refresh" --json number --jq 'length')
          if [ "$EXISTING" -gt "0" ]; then
            echo "Open data-refresh issue already exists, skipping creation"
            exit 0
          fi

          gh issue create \
            --title "[DATA REFRESH] Stale data bundles — $(date +%Y-%m-%d)" \
            --label "claude,data-refresh" \
            --body "$(cat <<'BODY'
          ## Stale Data Alert

          The weekly data freshness check found bundles older than 90 days:

          ${{ steps.freshness.outputs.STALE_BODY }}

          ### Data Freshness Table

          | Domain | Revision | Age | Status |
          |--------|----------|-----|--------|
          ${{ steps.freshness.outputs.SUMMARY_TABLE }}

          ### External Services

          - EEC site: ${{ steps.eec_check.outputs.EEC_REACHABLE == 'true' && '✅ reachable' || '❌ unreachable' }}
          - CBR site: ${{ steps.cbr_check.outputs.CBR_REACHABLE == 'true' && '✅ reachable' || '❌ unreachable' }}

          ### Recommended actions

          1. **Currency rates**: Run `python3 -m scripts.data_refresh` or `POST /api/sources/data/refresh`
          2. **Excise rates**: Check НК РФ Ст. 193 for amendments, then `POST /api/sources/payment-ingestion/excise/apply`
          3. **Anti-dumping**: Check eec.eaeunion.org for new measures, then `POST /api/sources/payment-ingestion/anti-dumping/apply`
          4. **ETT bundles**: Run `python3 -m scripts.fetch_eec_official` to refresh
          5. **Full audit**: `python3 -m app.scripts.official_payment_coverage_audit --json`

          🤖 Generated by scheduled-data-refresh workflow
          BODY
          )"

      - name: Summary
        run: |
          echo "### Data Refresh Check — $(date +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Domain | Revision | Age | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|----------|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.freshness.outputs.SUMMARY_TABLE }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**External services:**" >> $GITHUB_STEP_SUMMARY
          echo "- EEC: ${{ steps.eec_check.outputs.EEC_REACHABLE }}" >> $GITHUB_STEP_SUMMARY
          echo "- CBR: ${{ steps.cbr_check.outputs.CBR_REACHABLE }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.freshness.outputs.STALE }}" = "true" ]; then
            echo "⚠️ **${{ steps.freshness.outputs.STALE_COUNT }} stale domain(s)** — issue created" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ All bundles are fresh (< 90 days)" >> $GITHUB_STEP_SUMMARY
          fi

  check-rop-rates:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 9 1 12 *' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: customs-clear/backend
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Check ROP rates update
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: PYTHONPATH=. python3 scripts/check_rop_rates_update.py || true

  crawl-fts-rulings:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 4 * * 1' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: customs-clear/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -q httpx sqlalchemy loguru python-dotenv

      - name: Crawl FTS rulings (systematic folder crawler)
        run: PYTHONPATH=. python3 scripts/crawl_fts_rulings.py --max-pages 5 --max-documents 50 --no-ai || true

  sync-trois-registry:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 5 * * 1' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: customs-clear/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -q httpx sqlalchemy loguru python-dotenv pandas openpyxl beautifulsoup4

      - name: Fetch TROIS open registry + reload cache
        run: PYTHONPATH=. python3 scripts/fetch_trois_registry.py --alta --alta-max-pages 5 || true
