name: Scheduled Data Refresh Check

on:
  schedule:
    - cron: '0 2 * * 0'  # Every Sunday at 02:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-data-freshness:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: customs-clear/backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -q sqlalchemy loguru python-dotenv

      - name: Check ETT bundle freshness
        id: ett_check
        run: |
          python3 -c "
          import json
          from datetime import datetime, timedelta
          from pathlib import Path

          stale_domains = []

          bundles = {
              'EEC_ETT': 'data/raw_normative/eec_ett_normative_bundle.json',
              'EEC_VAT': 'data/raw_normative/eec_ett_vat.json',
              'EEC_EXCISE': 'data/raw_normative/eec_excise.json',
              'EEC_ANTI_DUMPING': 'data/raw_normative/eec_anti_dumping.json',
              'EEC_SPECIAL_SAFEGUARD': 'data/raw_normative/eec_special_safeguard.json',
              'EEC_COUNTERVAILING': 'data/raw_normative/eec_countervailing.json',
          }

          for domain, path in bundles.items():
              p = Path(path)
              if not p.exists():
                  stale_domains.append(f'{domain}: bundle missing')
                  continue
              with open(p) as f:
                  data = json.load(f)
              rev = data.get('revision', '')
              # Extract date from revision like 'ett:2026-06-18'
              parts = rev.split(':')
              if len(parts) >= 2:
                  try:
                      rev_date = datetime.strptime(parts[-1], '%Y-%m-%d')
                      age_days = (datetime.now() - rev_date).days
                      if age_days > 90:
                          stale_domains.append(f'{domain}: {age_days} days old (rev={rev})')
                  except ValueError:
                      stale_domains.append(f'{domain}: unparseable revision date ({rev})')
              else:
                  stale_domains.append(f'{domain}: no date in revision ({rev})')

          if stale_domains:
              print('STALE=true')
              body = '\\n'.join(f'- {s}' for s in stale_domains)
              print(f'STALE_BODY<<EOF')
              print(body)
              print('EOF')
          else:
              print('STALE=false')
          " >> "$GITHUB_OUTPUT"

      - name: Check for EEC ETT updates
        id: eec_check
        run: |
          python3 -c "
          import urllib.request
          import json

          # Check if EEC site is reachable and look for new decisions
          url = 'https://eec.eaeunion.org/comission/department/catr/ett/'
          try:
              req = urllib.request.Request(url, headers={'User-Agent': 'CustomsClear/1.0 data-refresh-check'})
              resp = urllib.request.urlopen(req, timeout=30)
              status = resp.status
              print(f'EEC_REACHABLE=true')
              print(f'EEC_STATUS={status}')
          except Exception as e:
              print(f'EEC_REACHABLE=false')
              print(f'EEC_ERROR={e}')
          " >> "$GITHUB_OUTPUT"

      - name: Create issue if data is stale
        if: steps.ett_check.outputs.STALE == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "[DATA REFRESH] Stale official data bundles detected" \
            --label "claude" \
            --body "$(cat <<'BODY'
          ## Stale Data Alert

          The scheduled data freshness check found bundles older than 90 days:

          ${{ steps.ett_check.outputs.STALE_BODY }}

          ### Recommended actions
          1. Check for new EEC decisions (Решения Совета/Коллегии ЕЭК) modifying the ETT
          2. Check for НК РФ amendments affecting VAT rates (Ст. 164) or Excise rates (Ст. 193)
          3. Check for new/expired trade remedy measures on eec.eaeunion.org
          4. Run `python3 -m scripts.fetch_eec_official` to refresh bundles
          5. Run the coverage audit: `python3 -m app.scripts.official_payment_coverage_audit --json`

          🤖 Generated by scheduled-data-refresh workflow
          BODY
          )"

      - name: Summary
        run: |
          echo "### Data Refresh Check Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.ett_check.outputs.STALE }}" = "true" ]; then
            echo "⚠️ **Stale bundles detected** — issue created" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "${{ steps.ett_check.outputs.STALE_BODY }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ All bundles are fresh (< 90 days)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "EEC site reachable: ${{ steps.eec_check.outputs.EEC_REACHABLE }}" >> $GITHUB_STEP_SUMMARY
