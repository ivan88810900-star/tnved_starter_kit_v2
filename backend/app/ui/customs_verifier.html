<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CustomsVerifier Pro — Проверка нетарифного контроля</title>
  <!-- Tailwind (CDN для быстрого прототипа) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React 18 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <!-- Babel для JSX в браузере -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Lucide React (иконки) -->
  <script crossorigin src="https://unpkg.com/lucide-react@latest/dist/lucide-react.umd.js"></script>
  <!-- XLSX для чтения Excel -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-gray-950">
  <div id="root"></div>

  <script type="text/babel">
    const {
      UploadCloud, Settings, CheckCircle2, AlertTriangle,
      XCircle, Play, Edit3, ChevronRight, FileSpreadsheet,
      Search, Key, Info, RefreshCw, ExternalLink, Database, Shield
    } = LucideReact || {};

    // --- Utils & API ---

    const extractCleanNumber = (cert) => {
      if (!cert) return '';
      const regex = /(?:ЕАЭС|ТС|РОСС)?\s*(?:N|№)?\s*(?:RU|BY|KZ|KG|AM)?\s*[А-ЯA-Z0-9-]{1,6}\.[А-ЯA-Z0-9-]{3,6}\.[А-ЯA-Z0-9]\.\d{4,6}\/\d{2,4}/i;
      const match = cert.match(regex);
      return match ? match[0].trim() : cert.trim();
    };

    async function fetchAggregatorAPI(cleanNumber) {
      if (!cleanNumber) return null;
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 3000);

      try {
        const response = await fetch(`https://ss-api.ru/documents?search=${encodeURIComponent(cleanNumber)}`, {
          method: 'GET',
          headers: { 'Accept': 'application/json' },
          signal: controller.signal
        });
        clearTimeout(timeoutId);

        if (response.ok) {
          const data = await response.json();
          return data;
        }
        return null;
      } catch (e) {
        clearTimeout(timeoutId);
        return null;
      }
    }

    async function verifyItemWithGemini(item, userApiKey, onProgress, initialUseWebSearch) {
      const apiKey = userApiKey || "";
      const modelName = apiKey ? 'gemini-2.5-flash' : 'gemini-2.5-flash-preview-09-2025';
      const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;

      const cleanCert = extractCleanNumber(item.cert);

      if (onProgress) onProgress('Поиск в базе данных...');
      const apiData = await fetchAggregatorAPI(cleanCert);

      let retries = 8;
      let delay = 2000;
      let lastErrorMessage = 'Неизвестная ошибка';
      let currentUseSearch = initialUseWebSearch;

      while (retries >= 0) {
        let fsaContext = currentUseSearch
          ? `Разрешительный документ (ФСА). ВАЖНО: Реестр закрыт. Используй google_search по сайтам "сертификаты-соответствия.рус" или "декларации-соответствия.рус". Твоя цель - найти СТАТУС (Действует/Прекращен) и даты.`
          : `Разрешительный документ (ФСА). Проверьте правильность формата номера документа.`;

        if (apiData && (apiData.items || apiData.length > 0)) {
          fsaContext = `Разрешительный документ (ФСА). БИНГО! Приложение уже сделало запрос в базу данных API и получило ответ JSON: ${JSON.stringify(apiData).substring(0, 1500)}. 
          ПРОАНАЛИЗИРУЙ эти данные БД! Обязательно найди там статус документа (слова вроде "Действует", "Аннулирован" или status: 1) и даты. 
          В поле details ОБЯЗАТЕЛЬНО начни ответ со слов "Статус: [Твой статус].". Если статус неясен, напиши "Статус: Найден в базе, но статус скрыт". Если есть ID или ссылка, верни её в directLink. НИЧЕГО НЕ ГУГЛИ ДЛЯ ФСА, используй эти данные!`;
        }

        const searchInstruction = currentUseSearch
          ? `2. Проверьте по базе ТРОИС (Таможенный реестр ОИС РФ). Используйте инструмент google_search для проверки бренда и рисков.`
          : `2. Проверьте по базе ТРОИС. (Инструмент веб-поиска отключен, опирайтесь только на базовые знания о бренде).`;

        const prompt = `
          Вы - эксперт по таможенному оформлению в РФ (декларант). 
          Проверьте данные импортируемого товара:
          - Наименование: ${item.name || 'Не указано'}
          - Код ТН ВЭД: ${item.hsCode || 'Не указан'}
          - Бренд/Изготовитель: ${item.brand || 'Не указан'}
          - Разрешительный документ: ${item.cert || 'Не указан'}

          Задачи:
          1. Проверьте, соответствует ли код ТН ВЭД описанию товара.
          ${searchInstruction}
          3. ${fsaContext}
          4. Нетарифное регулирование (ТР ТС / ЕАЭС). Проверьте соответствие типа документа (ДС или СС) заявленному товару:
             - Электроника (ТР ТС 004/020/037): для БЫТОВЫХ приборов обязателен Сертификат (СС). Декларации (ДС) недостаточно (она идет только на 037).
             - Косметика (ТР ТС 009): разные виды продукции (например, кремы для лица и скрабы для ног, смываемые и несмываемые) нельзя объединять в одну ДС, на них нужны разные документы.
             - Одежда (ТР ТС 017): 1-й слой - СС, 2-й и 3-й слой - ДС. Дети (ТР ТС 007): СС или СГР.
             Укажите, есть ли риски в нетарифном регулировании для данного товара, правильно ли выбран тип документа.

          ВАЖНО: Ответьте СТРОГО в формате JSON без какого-либо дополнительного текста до или после.
          Структура JSON должна быть ровно такой:
          {
            "status": "success" | "warning" | "error",
            "hsCode": { "valid": boolean, "comment": "string" },
            "trois": { "found": boolean, "details": "string" },
            "fsa": { "valid": boolean, "details": "string", "directLink": "string", "fromAPI": ${!!apiData} },
            "nonTariff": { "risk": boolean, "details": "string" },
            "recommendation": "string"
          }
        `;

        const payload = {
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: { temperature: 0.1 }
        };

        if (currentUseSearch) {
          payload.tools = [{ google_search: {} }];
        }

        try {
          if (onProgress) onProgress(currentUseSearch ? 'AI Анализ (с поиском)...' : 'AI Анализ (быстрый)...');

          const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          if (!response.ok) {
            const errText = await response.text();
            let errMsg = `HTTP ${response.status}`;
            try {
              const errObj = JSON.parse(errText);
              errMsg = errObj.error?.message || errMsg;
            } catch (e) {}

            if (response.status === 401) throw new Error(`Неверный API-ключ (401). Пожалуйста, проверьте правильность ключа.`);
            if (response.status === 400) throw new Error(`Ошибка запроса (400): ${errMsg}`);
            if (response.status === 429) throw new Error(`Лимит запросов (429): ${errMsg}`);
            throw new Error(`Сбой API: ${errMsg}`);
          }

          const data = await response.json();

          if (!data.candidates || data.candidates.length === 0) throw new Error('Ответ заблокирован. API не вернул кандидатов.');
          const candidate = data.candidates[0];
          if (!candidate.content || !candidate.content.parts) throw new Error(`Блокировка безопасности. Причина: ${candidate.finishReason}`);

          try {
            let textData = candidate.content.parts[0].text;
            textData = textData.replace(/```json/gi, '').replace(/```/g, '').trim();
            return JSON.parse(textData);
          } catch (e) {
            throw new Error('ИИ вернул ответ в неверном формате (ожидался JSON)');
          }
        } catch (error) {
          lastErrorMessage = error.message;

          if (lastErrorMessage.includes('Неверный API-ключ') || lastErrorMessage.includes('Ошибка запроса (400)') || lastErrorMessage.includes('Блокировка безопасности')) {
            break;
          }

          if (retries === 0) break;

          if (lastErrorMessage.includes('429') && currentUseSearch && retries <= 6) {
            currentUseSearch = false;
          }

          let currentWait = delay;
          const quotaMatch = lastErrorMessage.match(/retry in (\d+\.?\d*)s/i);
          if (quotaMatch) {
            currentWait = Math.ceil(parseFloat(quotaMatch[1]) * 1000) + 2000;
          } else {
            delay *= 2;
          }

          if (onProgress && (lastErrorMessage.includes('429') || quotaMatch)) {
            let secondsLeft = Math.ceil(currentWait / 1000);
            while (secondsLeft > 0) {
              onProgress(`Лимит Google (ждём ${secondsLeft}с)...`);
              await new Promise(res => setTimeout(res, 1000));
              secondsLeft--;
            }
          } else {
            await new Promise(res => setTimeout(res, currentWait));
          }

          retries--;
        }
      }
      throw new Error(lastErrorMessage);
    }

    function CustomsVerifierApp() {
      const { useState, useEffect, useMemo } = React;

      const [step, setStep] = useState(1);
      const [apiKey, setApiKey] = useState('');
      const [globalError, setGlobalError] = useState('');

      const [headers, setHeaders] = useState([]);
      const [rawRows, setRawRows] = useState([]);
      const [colPreviews, setColPreviews] = useState([]);

      const [colMap, setColMap] = useState({ name: '', hsCode: '', brand: '', cert: '' });
      const [items, setItems] = useState([]);
      const [isProcessing, setIsProcessing] = useState(false);
      const [copiedId, setCopiedId] = useState(null);
      const [useWebSearch, setUseWebSearch] = useState(true);
      const [statusFilter, setStatusFilter] = useState('all');
      const [searchQuery, setSearchQuery] = useState('');

      // Инициализация из localStorage
      useEffect(() => {
        const savedKey = localStorage.getItem('gemini_api_key');
        if (savedKey) setApiKey(savedKey);
        try {
          const saved = JSON.parse(localStorage.getItem('customs_verifier_session') || 'null');
          if (saved && Array.isArray(saved.items) && saved.items.length) {
            setItems(saved.items);
            setStep(saved.step || 3);
            setUseWebSearch(Boolean(saved.useWebSearch));
          }
        } catch (e) {}
      }, []);

      // Автосохранение сессии
      useEffect(() => {
        if (!items.length) return;
        const payload = { items, step, useWebSearch };
        localStorage.setItem('customs_verifier_session', JSON.stringify(payload));
      }, [items, step, useWebSearch]);

      const stats = useMemo(() => {
        const total = items.length;
        const done = items.filter(i => i.status === 'success' || i.status === 'error').length;
        const success = items.filter(i => i.result?.status === 'success').length;
        const warning = items.filter(i => i.result?.status === 'warning').length;
        const risk = items.filter(i => i.result?.status === 'error').length;
        const withDoc = items.filter(i => i.cert).length;
        const withoutDoc = total - withDoc;
        const errors = items.filter(i => i.status === 'error').length;
        return { total, done, success, warning, risk, withDoc, withoutDoc, errors };
      }, [items]);

      const filteredItems = useMemo(() => {
        return items.filter(item => {
          if (statusFilter === 'warnings') {
            if (!(item.status === 'success' && item.result?.status === 'warning')) return false;
          } else if (statusFilter === 'risks') {
            if (!(item.status === 'success' && item.result?.status === 'error')) return false;
          } else if (statusFilter === 'errors') {
            if (item.status !== 'error') return false;
          }
          if (!searchQuery.trim()) return true;
          const q = searchQuery.toLowerCase();
          return (
            (item.name || '').toLowerCase().includes(q) ||
            (item.hsCode || '').toLowerCase().includes(q) ||
            (item.brand || '').toLowerCase().includes(q) ||
            (item.cert || '').toLowerCase().includes(q)
          );
        });
      }, [items, statusFilter, searchQuery]);

      const exportCSV = () => {
        if (!items.length) {
          setGlobalError('Нет данных для экспорта.');
          setTimeout(() => setGlobalError(''), 3000);
          return;
        }
        const header = [
          '№',
          'Наименование',
          'ТН ВЭД',
          'Бренд',
          'Документ',
          'Статус проверки',
          'Комментарий ТН ВЭД',
          'ТРОИС',
          'ФСА',
          'Нетарифные меры',
          'Рекомендация'
        ];
        const rows = items.map((item, idx) => {
          const r = item.result || {};
          return [
            idx + 1,
            (item.name || '').replace(/\s+/g, ' '),
            item.hsCode || '',
            item.brand || '',
            item.cert || '',
            r.status || item.status || '',
            r.hsCode?.comment || '',
            r.trois?.details || '',
            r.fsa?.details || '',
            r.nonTariff?.details || '',
            r.recommendation || ''
          ].map(v => `"${String(v).replace(/"/g, '""')}"`).join(',');
        });
        const csv = [header.join(','), ...rows].join('\n');
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'customs_verifier_results.csv';
        a.click();
        URL.revokeObjectURL(url);
      };

      const exportCSVRisks = () => {
        const riskyItems = items.filter(item => {
          const status = item.result?.status;
          return status === 'warning' || status === 'error';
        });
        if (!riskyItems.length) {
          setGlobalError('Нет позиций с рисками или предупреждениями для экспорта.');
          setTimeout(() => setGlobalError(''), 3000);
          return;
        }
        const header = [
          '№',
          'Наименование',
          'ТН ВЭД',
          'Бренд',
          'Документ',
          'Статус проверки',
          'Комментарий ТН ВЭД',
          'ТРОИС',
          'ФСА',
          'Нетарифные меры',
          'Рекомендация'
        ];
        const rows = riskyItems.map((item, idx) => {
          const r = item.result || {};
          return [
            idx + 1,
            (item.name || '').replace(/\s+/g, ' '),
            item.hsCode || '',
            item.brand || '',
            item.cert || '',
            r.status || item.status || '',
            r.hsCode?.comment || '',
            r.trois?.details || '',
            r.fsa?.details || '',
            r.nonTariff?.details || '',
            r.recommendation || ''
          ].map(v => `"${String(v).replace(/"/g, '""')}"`).join(',');
        });
        const csv = [header.join(','), ...rows].join('\n');
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'customs_verifier_risks_only.csv';
        a.click();
        URL.revokeObjectURL(url);
      };

      const verifyOnlyProblems = async () => {
        if (isProcessing) return;
        const indices = items
          .map((item, idx) => ({ item, idx }))
          .filter(({ item }) =>
            item.status === 'error' ||
            (item.status === 'success' && item.result && item.result.status !== 'success')
          )
          .map(x => x.idx);
        if (!indices.length) {
          setGlobalError('Нет позиций с рисками или ошибками для повторной проверки.');
          setTimeout(() => setGlobalError(''), 3000);
          return;
        }
        setGlobalError('');
        setStep(4);
        setIsProcessing(true);
        for (const i of indices) {
          setItems(prev => prev.map((it, idx) => idx === i ? { ...it, status: 'loading', errorMsg: null, waitMsg: null } : it));
          try {
            const result = await verifyItemWithGemini(items[i], apiKey.trim(), (msg) => {
              setItems(prev => prev.map((it, idx) => idx === i ? { ...it, waitMsg: msg } : it));
            }, useWebSearch);
            setItems(prev => prev.map((it, idx) => idx === i ? { ...it, status: 'success', result, waitMsg: null } : it));
          } catch (error) {
            setItems(prev => prev.map((it, idx) => idx === i ? { ...it, status: 'error', errorMsg: error.message, waitMsg: null } : it));
          }
          const delayMs = useWebSearch ? 8000 : 2000;
          await new Promise(r => setTimeout(r, delayMs));
        }
        setIsProcessing(false);
      };

      const openRegistryFSA = (cert, idx) => {
        const cleanNumber = extractCleanNumber(cert);
        const el = document.createElement('textarea');
        el.value = cleanNumber;
        document.body.appendChild(el);
        el.select();
        try { document.execCommand('copy'); } catch (err) {}
        document.body.removeChild(el);

        setCopiedId(`${idx}-fsa`);
        setTimeout(() => setCopiedId(null), 4000);

        const isDS = cert.toLowerCase().includes('дс') || cert.toLowerCase().includes('д-') || cleanNumber.includes('Д-');
        const baseUrl = isDS ? 'https://pub.fsa.gov.ru/rds/declaration' : 'https://pub.fsa.gov.ru/rss/certificate';
        window.open(`${baseUrl}?q=${encodeURIComponent(cleanNumber)}`, '_blank');
      };

      const processAndFilterRows = (mapConfig, rowsData) => {
        const mappedItems = rowsData.map((row, idx) => {
          const nIdx = mapConfig.name !== '' ? parseInt(mapConfig.name, 10) : -1;
          const hIdx = mapConfig.hsCode !== '' ? parseInt(mapConfig.hsCode, 10) : -1;
          const bIdx = mapConfig.brand !== '' ? parseInt(mapConfig.brand, 10) : -1;
          const cIdx = mapConfig.cert !== '' ? parseInt(mapConfig.cert, 10) : -1;

          return {
            id: idx,
            name: nIdx >= 0 && row[nIdx] !== undefined ? String(row[nIdx]).trim() : '',
            hsCode: hIdx >= 0 && row[hIdx] !== undefined ? String(row[hIdx]).replace(/\D/g, '') : '',
            brand: bIdx >= 0 && row[bIdx] !== undefined ? String(row[bIdx]).trim() : '',
            cert: cIdx >= 0 && row[cIdx] !== undefined ? String(row[cIdx]).trim() : '',
            status: 'idle',
            result: null,
            errorMsg: null
          };
        }).filter(item => {
          if (!item.name && !item.hsCode) return false;
          const nameLower = item.name.toLowerCase();
          const garbageRegex = /total|итого|amount|weight|вес\s*(нетто|брутто)|gross|net|packages|контейнер|container|мест|общая\s*стоимость/i;
          if (garbageRegex.test(nameLower) && item.hsCode.length < 6) return false;
          if (item.name.length < 3 && item.hsCode.length < 4) return false;
          return true;
        });

        setItems(mappedItems);
        setStep(3);
      };

      const handleFileUpload = (e) => {
        setGlobalError('');
        if (isProcessing) return;
        if (!apiKey.trim()) {
          setGlobalError('Пожалуйста, введите API-ключ Gemini перед загрузкой файла.');
          e.target.value = null;
          return;
        }

        if (!window.XLSX) {
          setGlobalError('Библиотека Excel еще загружается, подождите секунду и попробуйте снова.');
          return;
        }

        const file = e.target.files[0];
        if (!file) return;

        localStorage.setItem('gemini_api_key', apiKey.trim());

        const reader = new FileReader();
        reader.onload = (evt) => {
          try {
            const bstr = evt.target.result;
            const wb = window.XLSX.read(bstr, { type: 'binary' });
            const wsname = wb.SheetNames[0];
            const ws = wb.Sheets[wsname];
            const data = window.XLSX.utils.sheet_to_json(ws, { header: 1 });

            if (data.length > 0) {
              let bestRowIdx = 0;
              let maxScore = -1;

              for (let i = 0; i < Math.min(data.length, 50); i++) {
                const row = data[i];
                if (!row || !row.length) continue;

                let score = 0;
                const rowStrings = row.map(c => String(c || '').toLowerCase());

                rowStrings.forEach(cell => {
                  if (/(наименовани|описание|name|description)/.test(cell)) score += 3;
                  if (/(тн\s*вэд|hs\s*code|tariff|тнвэд)/.test(cell)) score += 3;
                  if (/(бренд|изготовитель|марка|brand|manufacturer|производитель|тм)/.test(cell)) score += 2;
                  if (/(сертификат|дс|документ|cert|декларация)/.test(cell)) score += 2;
                  if (/(кол-во|qty|цена|price|вес|weight|код)/.test(cell)) score += 1;
                });

                if (score > maxScore) {
                  maxScore = score;
                  bestRowIdx = i;
                }
              }

              const headerRowIdx = maxScore >= 0 ? bestRowIdx : 0;
              let hdrs = data[headerRowIdx].map(h => h ? String(h).trim() : '');
              const rows = data.slice(headerRowIdx + 1).filter(r => r.length > 0);

              const maxCols = Math.max(hdrs.length, ...rows.map(r => r.length));
              while (hdrs.length < maxCols) hdrs.push('');

              const previews = [];
              for (let c = 0; c < maxCols; c++) {
                let preview = '';
                for (let r = 0; r < Math.min(rows.length, 10); r++) {
                  if (rows[r][c] && String(rows[r][c]).trim() !== '') {
                    preview = String(rows[r][c]).trim();
                    break;
                  }
                }
                previews.push(preview);
              }

              setHeaders(hdrs);
              setRawRows(rows);
              setColPreviews(previews);

              const autoMap = { name: '', hsCode: '', brand: '', cert: '' };

              hdrs.forEach((h, idx) => {
                const hl = h.toLowerCase();
                if (autoMap.name === '' && /(наименовани|описание|name|description)/.test(hl) && !/(бренд|марка)/.test(hl)) autoMap.name = String(idx);
                if (autoMap.hsCode === '' && /(тн\s*вэд|тнвэд|hs\s*code|tariff|кода*\s*тн)/.test(hl)) autoMap.hsCode = String(idx);
                if (autoMap.brand === '' && /(бренд|изготовитель|марка|brand|manufacturer|производитель|тм)/.test(hl)) autoMap.brand = String(idx);
                if (autoMap.cert === '' && /(сертификат|дс|документ|cert|декларация)/.test(hl)) autoMap.cert = String(idx);
              });

              hdrs.forEach((h, idx) => {
                const hl = h.toLowerCase();
                if (autoMap.name === '' && /(товар|good)/.test(hl) && !/(код|вес|цена|кол-во|сумма)/.test(hl)) autoMap.name = String(idx);
                if (autoMap.hsCode === '' && /(код|code)/.test(hl) && !/(товар|штрих|внутр)/.test(hl)) autoMap.hsCode = String(idx);
              });

              for (let c = 0; c < maxCols; c++) {
                const strC = String(c);
                if (Object.values(autoMap).includes(strC)) continue;

                const prevUpper = previews[c] ? previews[c].toUpperCase() : '';
                if (autoMap.cert === '' && (prevUpper.includes('ЕАЭС') || prevUpper.includes('РОСС RU') || prevUpper.includes('Д-CN') || prevUpper.includes('Д-RU') || prevUpper.includes('С-RU'))) {
                  autoMap.cert = strC;
                }
                if (autoMap.hsCode === '' && prevUpper.replace(/\D/g, '').length >= 8 && prevUpper.replace(/\D/g, '').length <= 10) {
                  autoMap.hsCode = strC;
                }
                if (autoMap.name === '' && previews[c] && previews[c].length > 15 && /[а-яА-Я]/.test(previews[c]) && !prevUpper.includes('ЕАЭС')) {
                  autoMap.name = strC;
                }
              }

              if (autoMap.name !== '' && autoMap.hsCode !== '') {
                processAndFilterRows(autoMap, rows);
              } else {
                setColMap(autoMap);
                setStep(2);
              }
            }
          } catch (err) {
            setGlobalError("Ошибка при чтении файла: " + err.message);
          }
        };
        reader.readAsBinaryString(file);
        e.target.value = null;
      };

      const applyMappingManual = () => {
        processAndFilterRows(colMap, rawRows);
      };

      const startVerification = async () => {
        if (isProcessing) return;

        setGlobalError('');
        setStep(4);
        setIsProcessing(true);

        for (let i = 0; i < items.length; i++) {
          if (items[i].status === 'success') continue;

          setItems(prev => prev.map((it, idx) => idx === i ? { ...it, status: 'loading', errorMsg: null, waitMsg: null } : it));

          try {
            const result = await verifyItemWithGemini(items[i], apiKey.trim(), (msg) => {
              setItems(prev => prev.map((it, idx) => idx === i ? { ...it, waitMsg: msg } : it));
            }, useWebSearch);
            setItems(prev => prev.map((it, idx) => idx === i ? { ...it, status: 'success', result, waitMsg: null } : it));
          } catch (error) {
            setItems(prev => prev.map((it, idx) => idx === i ? { ...it, status: 'error', errorMsg: error.message, waitMsg: null } : it));
          }

          const delayMs = useWebSearch ? 10000 : 2500;
          await new Promise(r => setTimeout(r, delayMs));
        }
        setIsProcessing(false);
      };

      const retryItem = async (index) => {
        if (isProcessing) {

          return;

        setItems(prev => prev.map((it, idx) => idx === index ? { ...it, status: 'loading', errorMsg: null, waitMsg: null } : it));
        try {

            setItems(prev => prev.map((it, idx) => idx === index ? { ...it, waitMsg: msg } : it));

          setItems(prev => prev.map((it, idx) => idx === index ? { ...it, status: 'success', result, waitMsg: null } : it));
        } catch (error) {

                              </span>
                            )}
                          </div>
                        </div>

                        <div className="shrink-0 flex items-center">
                          {item.status === 'idle' && <span className="text-xs text-gray-500 bg-gray-950 px-3 py-1.5 rounded-full border border-gray-800">Ожидание...</span>}
                          {item.status === 'loading' && (
                            <span className="text-xs text-blue-400 bg-blue-900/20 px-3 py-1.5 rounded-full border border-blue-800/50 flex items-center gap-2">
                              {RefreshCw && <RefreshCw className="w-3 h-3 animate-spin" />} {item.waitMsg || 'Анализ ИИ...'}
                            </span>
                          )}
                          {item.status === 'error' && (
                            <button onClick={() => retryItem(idx)} className="text-xs text-red-400 bg-red-900/20 hover:bg-red-900/40 px-3 py-1.5 rounded-full border border-red-800/50 flex items-center gap-2 transition">
                              {AlertTriangle && <AlertTriangle className="w-3 h-3" />} Ошибка (Повторить)
                            </button>
                          )}
                          {item.status === 'success' && item.result && (
                            <span
                              className={
                                "text-xs px-3 py-1.5 rounded-full border flex items-center gap-2 " +
                                (item.result.status === 'success'
                                  ? 'text-green-400 bg-green-900/20 border-green-800/50'
                                  : item.result.status === 'warning'
                                  ? 'text-yellow-400 bg-yellow-900/20 border-yellow-800/50'
                                  : 'text-red-400 bg-red-900/20 border-red-800/50')
                              }
                            >
                              {item.result.status === 'success'
                                ? (CheckCircle2 && <CheckCircle2 className="w-3 h-3" />)
                                : item.result.status === 'warning'
                                ? (AlertTriangle && <AlertTriangle className="w-3 h-3" />)
                                : (XCircle && <XCircle className="w-3 h-3" />)}
                              {item.result.status === 'success' ? 'Отлично' : item.result.status === 'warning' ? 'Внимание' : 'Риск'}
                            </span>
                          )}
                        </div>
                      </div>

                      {item.status === 'error' && (
                        <div className="pt-4 text-sm text-red-400 bg-red-950/20 p-3 rounded-lg mt-3 border border-red-900/30 flex gap-2 items-start">
                          {AlertTriangle && <AlertTriangle className="w-4 h-4 mt-0.5 shrink-0" />}
                          <div>{item.errorMsg}</div>
                        </div>
                      )}

                      {item.status === 'success' && item.result && (
                        <div className="pt-4 grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4">
                          <div className="bg-gray-950 rounded-xl p-4 border border-gray-800/80">
                            <div className="flex items-center gap-2 mb-2">
                              {item.result.hsCode?.valid
                                ? (CheckCircle2 && <CheckCircle2 className="w-4 h-4 text-green-500" />)
                                : (XCircle && <XCircle className="w-4 h-4 text-red-500" />)}
                              <h4 className="text-sm font-semibold text-gray-200">ТН ВЭД</h4>
                            </div>
                            <p className="text-xs text-gray-400">{item.result.hsCode?.comment || 'Код соответствует описанию'}</p>
                          </div>

                          <div className="bg-gray-950 rounded-xl p-4 border border-gray-800/80">
                            <div className="flex items-center gap-2 mb-2">
                              {item.result.trois?.found
                                ? (AlertTriangle && <AlertTriangle className="w-4 h-4 text-yellow-500" />)
                                : (CheckCircle2 && <CheckCircle2 className="w-4 h-4 text-green-500" />)}
                              <h4 className="text-sm font-semibold text-gray-200">ТРОИС (Бренд)</h4>
                            </div>
                            <p className="text-xs text-gray-400">
                              {item.result.trois?.found
                                ? <span className="text-yellow-200">{item.result.trois.details}</span>
                                : (item.result.trois?.details || 'Бренд не найден в реестре')}
                            </p>
                          </div>

                          <div className="bg-gray-950 rounded-xl p-4 border border-gray-800/80">
                            <div className="flex items-center gap-2 mb-2">
                              {item.result.nonTariff?.risk
                                ? (Shield && <Shield className="w-4 h-4 text-yellow-500" />)
                                : (Shield && <Shield className="w-4 h-4 text-green-500" />)}
                              <h4 className="text-sm font-semibold text-gray-200 flex items-center gap-2">
                                Меры контроля (ТР ТС)
                                {(() => {
                                  const text = (item.result.nonTariff?.details || '') + ' ' + (item.result.recommendation || '');
                                  const regs = [];
                                  if (/004/.test(text)) regs.push('ТР ТС 004');
                                  if (/020/.test(text)) regs.push('ТР ТС 020');
                                  if (/037/.test(text)) regs.push('ТР ТС 037');
                                  if (/009/.test(text)) regs.push('ТР ТС 009');
                                  if (/017/.test(text)) regs.push('ТР ТС 017');
                                  if (/007/.test(text)) regs.push('ТР ТС 007');
                                  const unique = Array.from(new Set(regs));
                                  if (!unique.length) return null;
                                  return (
                                    <span className="flex flex-wrap gap-1">
                                      {unique.map(code => (
                                        <span
                                          key={code}
                                          className="px-1.5 py-0.5 rounded-full bg-purple-900/40 border border-purple-700 text-[10px] font-mono text-purple-100"
                                        >
                                          {code}
                                        </span>
                                      ))}
                                    </span>
                                  );
                                })()}
                              </h4>
                            </div>
                            <p className="text-xs text-gray-400">
                              {item.result.nonTariff?.risk
                                ? <span className="text-yellow-200">{item.result.nonTariff.details}</span>
                                : (item.result.nonTariff?.details || 'Рисков по техрегламентам не выявлено')}
                            </p>
                          </div>

                          <div className="bg-gray-950 rounded-xl p-4 border border-gray-800/80">
                            <div className="flex items-center gap-2 mb-2">
                              {item.cert
                                ? (item.result.fsa?.valid
                                  ? (CheckCircle2 && <CheckCircle2 className="w-4 h-4 text-green-500" />)
                                  : (AlertTriangle && <AlertTriangle className="w-4 h-4 text-yellow-500" />))
                                : (Info && <Info className="w-4 h-4 text-gray-500" />)}
                              <h4 className="text-sm font-semibold text-gray-200 flex items-center gap-1.5">
                                ФСА (Документы)
                                {item.result.fsa?.fromAPI && (Database && <Database className="w-3 h-3 text-indigo-400" />)}
                              </h4>
                            </div>
                            <p className="text-xs text-gray-400 mb-4">{item.cert ? item.result.fsa?.details : 'Документ не был указан'}</p>

                            {item.cert && (
                              <div className="flex flex-wrap gap-2 relative mt-4">
                                {item.result.fsa?.directLink && (
                                  <a
                                    href={item.result.fsa.directLink}
                                    target="_blank"
                                    rel="noreferrer"
                                    className="inline-flex items-center justify-center gap-1.5 px-3 py-2 bg-green-900/20 hover:bg-green-900/40 border border-green-800/50 rounded-lg text-xs font-medium text-green-300 transition"
                                  >
                                    {ExternalLink && <ExternalLink className="w-3.5 h-3.5" />} Открыть документ
                                  </a>
                                )}

                                <a
                                  href={`https://yandex.ru/search/?text=${encodeURIComponent('"' + extractCleanNumber(item.cert) + '" (site:декларации-соответствия.рус OR site:сертификаты-соответствия.рус)')}`}
                                  target="_blank"
                                  rel="noreferrer"
                                  className="inline-flex items-center justify-center gap-1.5 px-3 py-2 bg-blue-900/20 hover:bg-blue-900/40 border border-blue-800/50 rounded-lg text-xs font-medium text-blue-300 transition"
                                >
                                  {Search && <Search className="w-3.5 h-3.5" />} Искать в базе (.рус)
                                </a>

                                <button
                                  onClick={() => openRegistryFSA(item.cert, idx)}
                                  className="inline-flex items-center justify-center gap-1.5 px-3 py-2 bg-gray-800 hover:bg-gray-700 border border-gray-700 rounded-lg text-xs font-medium text-gray-300 transition relative"
                                >
                                  {Search && <Search className="w-3.5 h-3.5" />} ФСА (Копировать)
                                  {copiedId === `${idx}-fsa` && (
                                    <span className="absolute -top-10 left-1/2 -translate-x-1/2 bg-green-600 text-white text-[11px] px-3 py-1.5 rounded-lg shadow-xl border border-green-500 flex items-center gap-1 z-10 whitespace-nowrap">
                                      {CheckCircle2 && <CheckCircle2 className="w-3 h-3" />} Скопировано (Ctrl+V)
                                    </span>
                                  )}
                                </button>
                              </div>
                            )}
                          </div>

                          <div className="col-span-1 md:col-span-2 xl:col-span-4 bg-blue-950/20 rounded-xl p-4 border border-blue-900/30 flex gap-3 mt-2">
                            {Info && <Info className="w-5 h-5 text-blue-400 shrink-0" />}
                            <p className="text-sm text-blue-200 leading-relaxed">{item.result.recommendation}</p>
                          </div>
                        </div>
                      )}

                      {item.status === 'loading' && (
                        <div className="pt-4 grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4 animate-pulse">
                          <div className="bg-gray-950 rounded-xl p-4 border border-gray-800 h-24"></div>
                          <div className="bg-gray-950 rounded-xl p-4 border border-gray-800 h-24"></div>
                          <div className="bg-gray-950 rounded-xl p-4 border border-gray-800 h-24"></div>
                          <div className="bg-gray-950 rounded-xl p-4 border border-gray-800 h-24"></div>
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              </div>
            )}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<CustomsVerifierApp />);
  </script>
</body>
</html>
